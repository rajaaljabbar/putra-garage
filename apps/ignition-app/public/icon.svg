<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0B"/>
      <stop offset="100%" style="stop-color:#1a1a1d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B00"/>
      <stop offset="100%" style="stop-color:#FF8C3A"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)" stroke="url(#accent)" stroke-width="8"/>
  <!-- Speedometer arc -->
  <path d="M140 340 A160 160 0 0 1 372 340" fill="none" stroke="url(#accent)" stroke-width="20" stroke-linecap="round"/>
  <!-- Needle -->
  <line x1="256" y1="256" x2="310" y2="160" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="18" fill="url(#accent)"/>
  <!-- Text IGNITION -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="52" fill="url(#accent)" letter-spacing="8">IGNITION</text>
  <!-- Bottom line -->
  <line x1="180" y1="445" x2="332" y2="445" stroke="url(#accent)" stroke-width="3" opacity="0.6"/>
</svg>
